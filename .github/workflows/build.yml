# This workflow builds native binaries for Linux, Windows, and macOS
# It runs on every push to main, pull request,
# tag push (v*), or manual trigger.
#
# Each platform produces a single installer file:
#   Linux   -> .AppImage and .deb
#   Windows -> .exe installer
#   macOS   -> .dmg image
#
# Creating a Release:
#   git tag vX.X.X
#   git push origin vX.X.X
#
#   This triggers the `release` job which collects all three artifacts
#   and publishes them as a GitHub Release with auto-generated notes.
#
# Manual trigger:
#   GitHub UI -> Actions -> Build Native Binaries -> Run workflow
#

name: Build Native Binaries

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: TileMakerDOT-Linux
          - name: Windows
            os: windows-latest
            artifact: TileMakerDOT-Windows
          - name: macOS
            os: macos-latest
            artifact: TileMakerDOT-macOS
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Download and Extract Portable JDK 16
        run: |
          if [ "${{ matrix.name }}" = "Windows" ]; then
            curl -L -o jdk16.zip "https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_windows_hotspot_16.0.2_7.zip"
            unzip -q jdk16.zip
            mv jdk-16.0.2* $GITHUB_WORKSPACE/jdk16
          elif [ "${{ matrix.name }}" = "macOS" ]; then
            curl -L -o jdk16.tar.gz "https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_mac_hotspot_16.0.2_7.tar.gz"
            tar -xzf jdk16.tar.gz
            mv jdk-16.0.2*/Contents/Home $GITHUB_WORKSPACE/jdk16
          else
            curl -L -o jdk16.tar.gz "https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_linux_hotspot_16.0.2_7.tar.gz"
            tar -xzf jdk16.tar.gz
            mv jdk-16.0.2* $GITHUB_WORKSPACE/jdk16
          fi
          echo "JAVA_HOME=$GITHUB_WORKSPACE/jdk16" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/jdk16/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace --info || { echo "::error::Gradle build failed" >&2; exit 1; }

      - name: Build native package (app-image)
        run: ./gradlew jpackageNative --no-daemon --stacktrace --info || { echo "::error::Gradle jpackageNative failed" >&2; exit 1; }

      - name: Build Windows installer
        if: matrix.name == 'Windows'
        run: ./gradlew jpackageWindowsInstaller --no-daemon --stacktrace --info || { echo "::error::Gradle jpackageWindowsInstaller failed" >&2; exit 1; }

      - name: Build .deb package (Linux only)
        if: matrix.name == 'Linux'
        run: ./gradlew jpackageDeb --no-daemon --stacktrace --info || { echo "::error::Gradle jpackageDeb failed" >&2; exit 1; }

      - name: Convert to .AppImage
        if: matrix.name == 'Linux'
        run: |
          set -euo pipefail
          trap 'echo "ERROR: appimagetool failed with exit code $?" >&2' ERR
          # Create .desktop file and copy icon for appimagetool
          APP_DIR="build/jpackage/TileMakerDOT"
          cp assets/icons/tile_editor_icon.png "$APP_DIR/TileMakerDOT.png"
          printf '%s\n' '[Desktop Entry]' 'Name=TileMakerDOT' 'Exec=TileMakerDOT' 'Icon=TileMakerDOT' 'Type=Application' 'Categories=Graphics;2DGraphics;' > "$APP_DIR/TileMakerDOT.desktop"
          chmod +x "$APP_DIR/TileMakerDOT.desktop"
          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          # Extract and run without FUSE (more reliable in CI)
          /tmp/appimagetool --appimage-extract-and-run \
            build/jpackage/TileMakerDOT/ \
            build/jpackage/TileMakerDOT-x86_64.AppImage

      - name: Upload Windows portable artifact
        if: matrix.name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TileMakerDOT-Windows-Portable
          path: build/jpackage/TileMakerDOT/**

      - name: Upload Windows installer artifact
        if: matrix.name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TileMakerDOT-Windows-Installer
          path: build/jpackage/*.exe

      - name: Build macOS dmg
        if: matrix.name == 'macOS'
        run: ./gradlew jpackageMacOS --no-daemon --stacktrace --info || { echo "::error::Gradle jpackageMacOS failed" >&2; exit 1; }

      - name: Upload macOS artifact
        if: matrix.name == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: TileMakerDOT-macOS
          path: build/jpackage/*.dmg

      - name: Upload Linux AppImage artifact
        if: matrix.name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TileMakerDOT-Linux-AppImage
          path: build/jpackage/*.AppImage

      - name: Upload Linux deb artifact
        if: matrix.name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: TileMakerDOT-Linux-Deb
          path: build/jpackage/*.deb

      - name: Final cleanup to prevent job cancellation
        if: always()
        run: |
          ./gradlew --stop || true
          exit 0

  release:
    name: Create Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TileMakerDOT-Linux-AppImage/**
            TileMakerDOT-Linux-Deb/**
            TileMakerDOT-Windows-Portable/**
            TileMakerDOT-Windows-Installer/**
            TileMakerDOT-macOS/**
          generate_release_notes: true
