# This workflow builds native binaries for Linux, Windows, and macOS
# It runs on every push to main, pull request,
# tag push (v*), or manual trigger.
#
# Each platform produces a single installer file:
#   Linux   -> .AppImage and .deb
#   Windows -> .exe installer
#   macOS   -> .dmg image
#
# Creating a Release:
#   git tag vX.X.X
#   git push origin vX.X.X
#
#   This triggers the `release` job which collects all three artifacts
#   and publishes them as a GitHub Release with auto-generated notes.
#
# Manual trigger:
#   GitHub UI -> Actions -> Build Native Binaries -> Run workflow
#

name: Build Native Binaries

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: TileMakerDOT-Linux
          - name: Windows
            os: windows-latest
            artifact: TileMakerDOT-Windows
          - name: macOS
            os: macos-latest
            artifact: TileMakerDOT-macOS
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Download and Extract Portable JDK 16
        run: |
          if [ "${{ matrix.name }}" = "Windows" ]; then
            curl -L -o jdk16.zip "https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_windows_hotspot_16.0.2_7.zip"
            unzip -q jdk16.zip
            mv jdk-16.0.2* $GITHUB_WORKSPACE/jdk16
          elif [ "${{ matrix.name }}" = "macOS" ]; then
            curl -L -o jdk16.tar.gz "https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_mac_hotspot_16.0.2_7.tar.gz"
            tar -xzf jdk16.tar.gz
            mv jdk-16.0.2*/Contents/Home $GITHUB_WORKSPACE/jdk16
          else
            curl -L -o jdk16.tar.gz "https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2+7/OpenJDK16U-jdk_x64_linux_hotspot_16.0.2_7.tar.gz"
            tar -xzf jdk16.tar.gz
            mv jdk-16.0.2* $GITHUB_WORKSPACE/jdk16
          fi
          echo "JAVA_HOME=$GITHUB_WORKSPACE/jdk16" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/jdk16/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Compile the core application code
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace --info || { echo "::error::Gradle build failed" >&2; exit 1; }

      # Generate the portable app-image layout + inject assets on ALL systems
      - name: Build cross-platform native portable package
        run: ./gradlew jpackageNative --no-daemon --stacktrace --info || { echo "::error::Gradle jpackageNative failed" >&2; exit 1; }

      # Compress Windows build (Runs only on Windows runner)
      - name: Archive Windows Portable Folder
        if: matrix.name == 'Windows'
        shell: powershell
        run: Compress-Archive -Path "build/jpackage/TileMakerDOT" -DestinationPath "build/jpackage/TileMakerDOT-Windows-x64.zip"
        
      # Compress Linux build (Runs only on Linux runner)
      - name: Archive Linux Portable Folder
        if: matrix.name == 'Linux'
        run: tar -czf build/jpackage/TileMakerDOT-Linux-x64.tar.gz -C build/jpackage TileMakerDOT

      # macOS step: No zipping needed anymore, just rename or verify the DMG
      - name: Prepare macOS DMG Installer
        if: matrix.name == 'macOS'
        run: |
          mv build/jpackage/TileMakerDOT-*.dmg build/jpackage/TileMakerDOT-macOS-x64.dmg || true

      # Upload the packed archive to the workflow workspace
      - name: Upload Native Portable Archive
        uses: actions/upload-artifact@v4
        with:
          name: TileMakerDOT-${{ matrix.name }}-Archive
          path: |
            build/jpackage/*.zip
            build/jpackage/*.tar.gz
            build/jpackage/*.dmg

      - name: Final cleanup to prevent job cancellation
        if: always()
        run: |
          ./gradlew --stop || true
          exit 0

  release:
    name: Create Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true # Flattens your single file distributions into one directory

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
          generate_release_notes: true
